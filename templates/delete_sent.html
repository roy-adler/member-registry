{% extends "base.html" %}
{% block title %}Confirm Deletion{% endblock %}
{% block content %}
<div class="card">
    <h1>Confirm Deletion</h1>
    <p style="margin-bottom: 15px;">A deletion request has been created for <strong>{{ email }}</strong>.</p>
    <p style="margin-bottom: 15px;">Click the following link to permanently delete your data:</p>
    <p style="margin-bottom: 20px;"><a href="{{ delete_url }}" class="btn btn-danger">Permanently Delete Data</a></p>
    <p style="color: #888; font-size: 14px;">The link is valid for 1 hour.</p>
</div>
{% endblock %}
