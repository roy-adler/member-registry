{% extends "base.html" %}
{% block title %}Mitglied bearbeiten{% endblock %}
{% block content %}
<div class="card">
    <h1>Mitglied bearbeiten</h1>
    <form method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required value="{{ member.name }}">

        <label for="email">E-Mail</label>
        <input type="email" id="email" name="email" required value="{{ member.email }}">

        <label for="address">Adresse</label>
        <input type="text" id="address" name="address" required value="{{ member.address }}">

        <label for="phone">Telefonnummer</label>
        <input type="tel" id="phone" name="phone" required value="{{ member.phone }}">

        <button type="submit" class="btn btn-primary">Speichern</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Abbrechen</a>
    </form>
</div>
{% endblock %}
