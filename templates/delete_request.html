{% extends "base.html" %}
{% block title %}Daten loeschen{% endblock %}
{% block content %}
<div class="card">
    <h1>Eigene Daten loeschen</h1>
    <p style="margin-bottom: 20px; color: #666;">Gib deine E-Mail-Adresse ein, um deine Registrierung zu loeschen.</p>
    <form method="POST">
        <label for="email">E-Mail</label>
        <input type="email" id="email" name="email" required placeholder="max@beispiel.de">
        <button type="submit" class="btn btn-danger">Loeschung beantragen</button>
    </form>
</div>
{% endblock %}
