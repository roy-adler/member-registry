{% extends "base.html" %}
{% block title %}Delete Data{% endblock %}
{% block content %}
<div class="card">
    <h1>Delete Your Data</h1>
    <p style="margin-bottom: 20px; color: #666;">Enter your email address to delete your registration.</p>
    <form method="POST">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="john@example.com">
        <button type="submit" class="btn btn-danger">Request Deletion</button>
    </form>
</div>
{% endblock %}
